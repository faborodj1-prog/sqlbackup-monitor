<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SqlBackup Monitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#222;font-size:14px}
header{background:#1a2235;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px #0004}
header h1{font-size:18px;font-weight:600;letter-spacing:.3px}
header span{font-size:12px;opacity:.6;margin-left:auto}
button{cursor:pointer;border:none;border-radius:6px;font-size:13px;font-family:inherit;padding:6px 14px;transition:opacity .15s}
button:hover{opacity:.85}

/* ── Filtros ── */
.filters{background:#fff;border-bottom:1px solid #e0e4ea;padding:12px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.fgroup{display:flex;flex-direction:column;gap:4px}
.fgroup label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.fgroup input,.fgroup select{height:34px;border:1px solid #d0d5dd;border-radius:6px;padding:0 10px;font-size:13px;font-family:inherit;outline:none;background:#fafafa}
.fgroup input:focus,.fgroup select:focus{border-color:#4a7eff;background:#fff}
.period-btns{display:flex;gap:6px;align-items:flex-end}
.period-btns button{height:34px;background:#eef2ff;color:#3b5bdb;font-weight:600;border:1px solid #c5d0f7}
.period-btns button.active{background:#3b5bdb;color:#fff;border-color:#3b5bdb}
.btn-filter{height:34px;background:#3b5bdb;color:#fff;font-weight:600;padding:0 18px}
.btn-clear{height:34px;background:#f3f4f6;color:#555;border:1px solid #d0d5dd}

/* ── Cards de status ── */
.cards{display:flex;flex-wrap:wrap;gap:14px;padding:18px 24px 0}
.card{background:#fff;border-radius:10px;padding:14px 18px;min-width:200px;flex:1;box-shadow:0 1px 4px #0001;border-left:4px solid #ccc;cursor:pointer;transition:box-shadow .15s}
.card:hover{box-shadow:0 3px 12px #0002}
.card.ok{border-color:#2da44e}
.card.erro{border-color:#cf222e}
.card.alerta{border-color:#d4a017}
.card.rodando{border-color:#0969da}
.card-title{font-size:12px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.card-name{font-size:15px;font-weight:700;margin-bottom:2px}
.card-sub{font-size:12px;color:#888}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge.ok{background:#dafbe1;color:#1a7f37}
.badge.erro{background:#ffebe9;color:#cf222e}
.badge.alerta{background:#fff8c5;color:#9a6700}
.badge.rodando{background:#ddf4ff;color:#0550ae}

/* ── Tabela ── */
.section{padding:18px 24px}
.section-title{font-size:14px;font-weight:700;color:#444;margin-bottom:10px}
.table-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 4px #0001;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f6f8fa;border-bottom:2px solid #e0e4ea}
th{padding:10px 12px;text-align:left;font-weight:600;color:#555;white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f2f5;transition:background .1s}
tbody tr:hover{background:#f6f8ff;cursor:pointer}
td{padding:9px 12px;vertical-align:middle}
.no-data{text-align:center;padding:32px;color:#aaa;font-style:italic}

/* ── Paginação ── */
.pagination{display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:12px 24px}
.pagination button{height:30px;min-width:30px;background:#fff;border:1px solid #d0d5dd;color:#444;border-radius:6px;font-size:12px}
.pagination button.active{background:#3b5bdb;color:#fff;border-color:#3b5bdb}
.pagination span{font-size:12px;color:#666}

/* ── Modal detalhe cliente ── */
.overlay{position:fixed;inset:0;background:#0006;z-index:100;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:min(820px,96vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px #0003}
.modal-header{padding:16px 20px;border-bottom:1px solid #e0e4ea;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:16px;font-weight:700}
.modal-close{background:#f3f4f6;color:#555;width:32px;height:32px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-info{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.info-chip{background:#f0f4ff;border-radius:8px;padding:6px 14px;font-size:12px;color:#3b5bdb;font-weight:600}
.modal-period{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.modal-period label{font-size:12px;color:#666;font-weight:600}
.modal-period input{height:30px;border:1px solid #d0d5dd;border-radius:6px;padding:0 8px;font-size:12px}
.modal-period button{height:30px;background:#eef2ff;color:#3b5bdb;font-weight:600;border:1px solid #c5d0f7;font-size:12px}
.modal-period button.active{background:#3b5bdb;color:#fff;border-color:#3b5bdb}
.modal table td,.modal table th{padding:8px 10px;font-size:12px}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat-box{flex:1;min-width:120px;background:#f6f8fa;border-radius:8px;padding:10px 14px;text-align:center}
.stat-box .sv{font-size:22px;font-weight:800;color:#3b5bdb}
.stat-box .sl{font-size:11px;color:#888;margin-top:2px}
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7eb3ff" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4.03 3-9 3S3 13.66 3 12"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/></svg>
  <h1>SqlBackup Monitor</h1>
  <span id="lastUpdate">—</span>
  <button onclick="carregar()" style="background:#2d3f60;color:#aec8ff;border:1px solid #3d5480;margin-left:8px">↺ Atualizar</button>
</header>

<!-- FILTROS -->
<div class="filters">
  <div class="fgroup">
    <label>Cliente</label>
    <input id="fCliente" type="text" placeholder="Nome ou documento..." style="width:220px" oninput="aplicarFiltros()"/>
  </div>

  <div class="fgroup">
    <label>De</label>
    <input id="fDe" type="date" onchange="limparPeriodoBtns();aplicarFiltros()"/>
  </div>
  <div class="fgroup">
    <label>Até</label>
    <input id="fAte" type="date" onchange="limparPeriodoBtns();aplicarFiltros()"/>
  </div>

  <div class="period-btns">
    <button id="btnHoje" onclick="setPeriodo('hoje')">Hoje</button>
    <button id="btnMes" onclick="setPeriodo('mes')">Este mês</button>
    <button id="btnMesAnt" onclick="setPeriodo('mesant')">Mês anterior</button>
  </div>

  <div class="fgroup">
    <label>Tipo</label>
    <select id="fTipo" onchange="aplicarFiltros()">
      <option value="">Todos</option>
      <option value="OK">✅ OK</option>
      <option value="Erro">🚨 Erro</option>
      <option value="Alerta">⚠️ Alerta</option>
    </select>
  </div>

  <button class="btn-clear" onclick="limparFiltros()">✕ Limpar</button>
</div>

<!-- CARDS -->
<div class="cards" id="cards">
  <div class="no-data" style="width:100%">Carregando...</div>
</div>

<!-- TABELA -->
<div class="section">
  <div class="section-title">Histórico de Eventos</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Data/Hora</th><th>Tipo</th><th>Banco</th><th>Cliente</th>
          <th>Doc</th><th>Ciclo</th><th>Arquivo</th>
          <th>Dados GB</th><th>Express %</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="10" class="no-data">Carregando...</td></tr></tbody>
    </table>
  </div>
</div>
<div class="pagination" id="pag"></div>

<!-- MODAL DETALHE CLIENTE -->
<div class="overlay" id="overlay" onclick="fecharModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modalTitulo">Detalhe do Cliente</h2>
      <button class="modal-close" onclick="fecharModalBtn()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-info" id="modalInfo"></div>
      <div class="stats-row" id="modalStats"></div>
      <div class="modal-period">
        <label>Período:</label>
        <input id="mDe" type="date" onchange="limparModalBtns();renderModalTabela()"/>
        <input id="mAte" type="date" onchange="limparModalBtns();renderModalTabela()"/>
        <button id="mBtnHoje" onclick="setModalPeriodo('hoje')">Hoje</button>
        <button id="mBtnMes" onclick="setModalPeriodo('mes')">Esta semana</button>
        <button id="mBtnMesAnt" onclick="setModalPeriodo('mesant')">Este mês</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Data/Hora</th><th>Tipo</th><th>Banco</th><th>Ciclo</th>
            <th>Arquivo</th><th>Dados GB</th><th>Status</th>
          </tr></thead>
          <tbody id="modalTbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const API = ''; // mesma origem — ASP.NET Core serve o HTML e a API juntos
let todos = [];        // todos os eventos brutos
let filtrados = [];    // após filtros
let paginaAtual = 1;
const POR_PAG = 50;
let clienteAtual = null; // para o modal

// ── Carregar dados ────────────────────────────────────────────
async function carregar() {
  try {
    const r = await fetch(`${API}/api/backup?limit=2000`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    todos = await r.json();
    document.getElementById('lastUpdate').textContent =
      '↺ ' + new Date().toLocaleTimeString('pt-BR');
    aplicarFiltros();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="10" class="no-data">Erro ao carregar: ${e.message}</td></tr>`;
  }
}

// ── Filtros ───────────────────────────────────────────────────
function aplicarFiltros() {
  const cli  = norm(document.getElementById('fCliente').value);
  const tipo = document.getElementById('fTipo').value;
  const de   = document.getElementById('fDe').value;
  const ate  = document.getElementById('fAte').value;

  filtrados = todos.filter(r => {
    if (cli && !norm(r.ClienteNome).includes(cli) && !norm(r.ClienteCNPJ).includes(cli)) return false;
    if (tipo && r.TipoBackup !== tipo) return false;
    const dt = new Date(r.DataExecucao);
    if (de  && dt < new Date(de  + 'T00:00:00')) return false;
    if (ate && dt > new Date(ate + 'T23:59:59')) return false;
    return true;
  });

  paginaAtual = 1;
  renderCards();
  renderTabela();
  renderPag();
}

function norm(s){ return (s||'').toLowerCase().replace(/[.\-\/]/g,'').trim(); }

function limparFiltros() {
  document.getElementById('fCliente').value = '';
  document.getElementById('fTipo').value    = '';
  document.getElementById('fDe').value      = '';
  document.getElementById('fAte').value     = '';
  limparPeriodoBtns();
  aplicarFiltros();
}

function setPeriodo(p) {
  const hoje = new Date();
  let de, ate;
  if (p === 'hoje') {
    de = ate = fmtDate(hoje);
  } else if (p === 'mes') {
    de  = fmtDate(new Date(hoje.getFullYear(), hoje.getMonth(), 1));
    ate = fmtDate(hoje);
  } else {
    const m = new Date(hoje.getFullYear(), hoje.getMonth() - 1, 1);
    de  = fmtDate(m);
    ate = fmtDate(new Date(hoje.getFullYear(), hoje.getMonth(), 0));
  }
  document.getElementById('fDe').value  = de;
  document.getElementById('fAte').value = ate;
  document.querySelectorAll('.period-btns button').forEach(b => b.classList.remove('active'));
  document.getElementById(p==='hoje'?'btnHoje':p==='mes'?'btnMes':'btnMesAnt').classList.add('active');
  aplicarFiltros();
}

function limparPeriodoBtns() {
  document.querySelectorAll('.period-btns button').forEach(b => b.classList.remove('active'));
}

function fmtDate(d) {
  return d.toISOString().slice(0,10);
}

// ── Cards de status atual por banco ──────────────────────────
function renderCards() {
  // Pega o evento mais recente de cada banco dentro dos filtrados
  const bancos = {};
  for (const r of filtrados) {
    const k = (r.ClienteNome||'') + '|' + (r.BancoNome||'');
    if (!bancos[k] || new Date(r.DataExecucao) > new Date(bancos[k].DataExecucao))
      bancos[k] = r;
  }
  const entries = Object.values(bancos);
  const el = document.getElementById('cards');
  if (!entries.length) { el.innerHTML = '<div class="no-data" style="width:100%">Nenhum dado encontrado</div>'; return; }

  el.innerHTML = entries.map(r => {
    const t = (r.TipoBackup||'').toLowerCase();
    const cls = t==='ok'?'ok':t==='erro'?'erro':t==='alerta'?'alerta':'rodando';
    const dt  = r.DataExecucao ? new Date(r.DataExecucao).toLocaleString('pt-BR') : '—';
    return `<div class="card ${cls}" onclick="abrirCliente('${esc(r.ClienteNome)}','${esc(r.ClienteCNPJ)}')">
      <div class="card-title">${esc(r.BancoNome||'—')}</div>
      <div class="card-name">${esc(r.ClienteNome||'—')}</div>
      <div class="card-sub" style="margin-bottom:6px">${esc(r.ClienteCNPJ||'')}</div>
      <span class="badge ${cls}">${r.TipoBackup||'—'}</span>
      <div class="card-sub" style="margin-top:6px">${dt}</div>
    </div>`;
  }).join('');
}

// ── Tabela principal ──────────────────────────────────────────
function renderTabela() {
  const inicio = (paginaAtual-1)*POR_PAG;
  const pg     = filtrados.slice(inicio, inicio+POR_PAG);
  const tbody  = document.getElementById('tbody');
  if (!pg.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="no-data">Nenhum registro encontrado</td></tr>';
    return;
  }
  tbody.innerHTML = pg.map(r => {
    const t  = (r.TipoBackup||'').toLowerCase();
    const cls = t==='ok'?'ok':t==='erro'?'erro':t==='alerta'?'alerta':'rodando';
    const dt  = r.DataExecucao ? new Date(r.DataExecucao).toLocaleString('pt-BR') : '—';
    return `<tr onclick="abrirCliente('${esc(r.ClienteNome)}','${esc(r.ClienteCNPJ)}')">
      <td>${dt}</td>
      <td><span class="badge ${cls}">${r.TipoBackup||'—'}</span></td>
      <td>${esc(r.BancoNome||'—')}</td>
      <td><b>${esc(r.ClienteNome||'—')}</b></td>
      <td style="color:#888;font-size:12px">${esc(r.ClienteCNPJ||'')}</td>
      <td style="font-size:12px">${esc(r.Ciclo||'—')}</td>
      <td style="font-size:11px;color:#666">${esc(r.NomeArquivo||'—')}</td>
      <td>${r.TamanhoDadosGB||'—'}</td>
      <td>${r.PercentualExpress!=null?r.PercentualExpress+'%':'—'}</td>
      <td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.Status||'')}">${esc(r.Status||'—')}</td>
    </tr>`;
  }).join('');
}

function renderPag() {
  const total = Math.ceil(filtrados.length / POR_PAG);
  const el    = document.getElementById('pag');
  if (total <= 1) { el.innerHTML=''; return; }
  let h = `<span>${filtrados.length} registros</span>`;
  if (paginaAtual>1) h+=`<button onclick="irPag(${paginaAtual-1})">‹</button>`;
  const start = Math.max(1, paginaAtual-2), end = Math.min(total, paginaAtual+2);
  for (let i=start;i<=end;i++)
    h+=`<button class="${i===paginaAtual?'active':''}" onclick="irPag(${i})">${i}</button>`;
  if (paginaAtual<total) h+=`<button onclick="irPag(${paginaAtual+1})">›</button>`;
  el.innerHTML = h;
}

function irPag(n) { paginaAtual=n; renderTabela(); renderPag(); window.scrollTo(0,0); }

// ── Modal detalhe cliente ─────────────────────────────────────
function abrirCliente(nome, doc) {
  clienteAtual = {nome, doc};
  document.getElementById('modalTitulo').textContent = nome || 'Cliente';
  document.getElementById('modalInfo').innerHTML =
    `<div class="info-chip">👤 ${esc(nome||'—')}</div>
     <div class="info-chip">📄 ${esc(doc||'—')}</div>`;

  // Default: esta semana
  setModalPeriodo('mes');
  document.getElementById('overlay').classList.add('open');
}

function fecharModal(e) { if(e.target===document.getElementById('overlay')) fecharModalBtn(); }
function fecharModalBtn() {
  document.getElementById('overlay').classList.remove('open');
  clienteAtual = null;
}

function setModalPeriodo(p) {
  const hoje = new Date();
  let de, ate;
  if (p === 'hoje') {
    de = ate = fmtDate(hoje);
  } else if (p === 'mes') {
    // Esta semana
    const dow = hoje.getDay();
    const seg = new Date(hoje); seg.setDate(hoje.getDate() - (dow===0?6:dow-1));
    de  = fmtDate(seg);
    ate = fmtDate(hoje);
  } else {
    de  = fmtDate(new Date(hoje.getFullYear(), hoje.getMonth(), 1));
    ate = fmtDate(hoje);
  }
  document.getElementById('mDe').value  = de;
  document.getElementById('mAte').value = ate;
  document.querySelectorAll('.modal-period button').forEach(b=>b.classList.remove('active'));
  document.getElementById(p==='hoje'?'mBtnHoje':p==='mes'?'mBtnMes':'mBtnMesAnt').classList.add('active');
  renderModalTabela();
}

function limparModalBtns() {
  document.querySelectorAll('.modal-period button').forEach(b=>b.classList.remove('active'));
}

function renderModalTabela() {
  if (!clienteAtual) return;
  const {nome, doc} = clienteAtual;
  const de  = document.getElementById('mDe').value;
  const ate = document.getElementById('mAte').value;

  const registros = todos.filter(r => {
    const nomeOk = norm(r.ClienteNome) === norm(nome);
    const docOk  = norm(r.ClienteCNPJ) === norm(doc);
    if (!nomeOk && !docOk) return false;
    const dt = new Date(r.DataExecucao);
    if (de  && dt < new Date(de  + 'T00:00:00')) return false;
    if (ate && dt > new Date(ate + 'T23:59:59')) return false;
    return true;
  }).sort((a,b)=>new Date(b.DataExecucao)-new Date(a.DataExecucao));

  // Stats
  const total  = registros.length;
  const ok     = registros.filter(r=>r.TipoBackup==='OK').length;
  const erros  = registros.filter(r=>r.TipoBackup==='Erro').length;
  const alertas= registros.filter(r=>r.TipoBackup==='Alerta').length;
  document.getElementById('modalStats').innerHTML = `
    <div class="stat-box"><div class="sv">${total}</div><div class="sl">Total</div></div>
    <div class="stat-box"><div class="sv" style="color:#2da44e">${ok}</div><div class="sl">OK</div></div>
    <div class="stat-box"><div class="sv" style="color:#cf222e">${erros}</div><div class="sl">Erros</div></div>
    <div class="stat-box"><div class="sv" style="color:#d4a017">${alertas}</div><div class="sl">Alertas</div></div>`;

  const tbody = document.getElementById('modalTbody');
  if (!registros.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="no-data">Nenhum registro neste período</td></tr>';
    return;
  }
  tbody.innerHTML = registros.map(r => {
    const t   = (r.TipoBackup||'').toLowerCase();
    const cls = t==='ok'?'ok':t==='erro'?'erro':t==='alerta'?'alerta':'rodando';
    const dt  = r.DataExecucao ? new Date(r.DataExecucao).toLocaleString('pt-BR') : '—';
    return `<tr>
      <td>${dt}</td>
      <td><span class="badge ${cls}">${r.TipoBackup||'—'}</span></td>
      <td>${esc(r.BancoNome||'—')}</td>
      <td style="font-size:11px">${esc(r.Ciclo||'—')}</td>
      <td style="font-size:11px;color:#666">${esc(r.NomeArquivo||'—')}</td>
      <td>${r.TamanhoDadosGB||'—'}</td>
      <td style="font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.Status||'')}">${esc(r.Status||'—')}</td>
    </tr>`;
  }).join('');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──────────────────────────────────────────────────────
carregar();
setInterval(carregar, 60000);
</script>
</body>
</html>
