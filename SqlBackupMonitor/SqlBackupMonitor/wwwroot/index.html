<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SqlBackup Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:      #0a0c10;
    --surface: #111318;
    --border:  #1e2128;
    --border2: #2a2f3a;
    --text:    #e2e6f0;
    --muted:   #6b7280;
    --ok:      #22c55e;
    --erro:    #ef4444;
    --alerta:  #f59e0b;
    --accent:  #3b82f6;
    --accent2: #6366f1;
    --mono:    'JetBrains Mono', monospace;
    --ui:      'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.6; min-height: 100vh; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px); pointer-events:none; z-index:1000; }

  header { border-bottom:1px solid var(--border); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; background:rgba(10,12,16,.95); backdrop-filter:blur(8px); z-index:100; }
  .logo { font-family:var(--ui); font-weight:800; font-size:16px; letter-spacing:-.5px; display:flex; align-items:center; gap:10px; }
  .logo-dot { width:8px; height:8px; background:var(--ok); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
  .header-right { display:flex; align-items:center; gap:16px; }
  .last-update { color:var(--muted); font-size:11px; }
  .btn-refresh { background:var(--surface); border:1px solid var(--border2); color:var(--text); font-family:var(--mono); font-size:11px; padding:5px 12px; cursor:pointer; border-radius:4px; transition:border-color .2s; }
  .btn-refresh:hover { border-color:var(--accent); color:var(--accent); }

  main { max-width:1400px; margin:0 auto; padding:28px 32px; display:flex; flex-direction:column; gap:28px; }

  .section-title { font-family:var(--ui); font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:18px 20px; position:relative; overflow:hidden; transition:border-color .2s,transform .2s; }
  .card:hover { border-color:var(--border2); transform:translateY(-1px); }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .card.ok::before     { background:var(--ok); }
  .card.erro::before   { background:var(--erro); }
  .card.alerta::before { background:var(--alerta); }

  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .card-banco { font-family:var(--ui); font-size:15px; font-weight:800; }
  .badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; letter-spacing:.5px; }
  .badge.ok     { background:rgba(34,197,94,.15);  color:var(--ok); }
  .badge.erro   { background:rgba(239,68,68,.15);  color:var(--erro); }
  .badge.alerta { background:rgba(245,158,11,.15); color:var(--alerta); }

  .card-cliente { color:var(--muted); font-size:11px; margin-bottom:2px; }
  .card-doc     { font-size:10px; color:var(--muted); opacity:.7; margin-bottom:10px; }
  .card-metrics { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding-top:10px; border-top:1px solid var(--border); }
  .metric label { display:block; font-size:10px; color:var(--muted); margin-bottom:2px; }
  .metric value { font-size:13px; font-weight:600; }
  .express-bar { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
  .express-bar-label { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-bottom:5px; }
  .express-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .express-fill { height:100%; border-radius:2px; transition:width .6s ease; }
  .card-ts  { font-size:10px; color:var(--muted); margin-top:8px; opacity:.6; }
  .card-msg { font-size:10px; color:var(--muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .chart-container { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:20px 24px; }
  .chart-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .chart-canvas-wrap { position:relative; height:240px; }
  select { background:var(--bg); border:1px solid var(--border2); color:var(--text); font-family:var(--mono); font-size:11px; padding:5px 10px; border-radius:4px; outline:none; cursor:pointer; }
  select:focus { border-color:var(--accent); }

  .table-container { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .table-toolbar { display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  table { width:100%; border-collapse:collapse; }
  thead th { font-family:var(--ui); font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); background:rgba(0,0,0,.2); white-space:nowrap; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
  tbody tr:hover { background:rgba(255,255,255,.02); }
  tbody tr:last-child { border-bottom:none; }
  td { padding:8px 14px; font-size:12px; vertical-align:middle; }
  td.muted { color:var(--muted); font-size:11px; }

  .loader { display:flex; align-items:center; justify-content:center; gap:8px; padding:40px; color:var(--muted); font-size:12px; }
  .spin { width:14px; height:14px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  @media(max-width:640px) { header{padding:0 16px} main{padding:16px} }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>SqlBackup Monitor</div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="btn-refresh" onclick="carregarTudo()">↺ Atualizar</button>
  </div>
</header>

<main>
  <section>
    <div class="section-title">Status Atual por Banco</div>
    <div class="cards-grid" id="cardsContainer">
      <div class="loader"><div class="spin"></div> Carregando...</div>
    </div>
  </section>

  <section>
    <div class="section-title">Tamanho do Banco ao Longo do Tempo</div>
    <div class="chart-container">
      <div class="chart-toolbar">
        <div style="display:flex;gap:10px;align-items:center;">
          <select id="selectBancoGrafico" onchange="carregarGrafico()">
            <option value="">Todos os bancos</option>
          </select>
          <select id="selectDias" onchange="carregarGrafico()">
            <option value="7">Últimos 7 dias</option>
            <option value="30" selected>Últimos 30 dias</option>
            <option value="90">Últimos 90 dias</option>
          </select>
        </div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--muted);">
          <span><span style="color:var(--accent);">●</span> Dados (GB)</span>
          <span><span style="color:var(--accent2);">●</span> Log (GB)</span>
        </div>
      </div>
      <div class="chart-canvas-wrap"><canvas id="chartTamanho"></canvas></div>
    </div>
  </section>

  <section>
    <div class="section-title">Histórico de Eventos</div>
    <div class="table-container">
      <div class="table-toolbar">
        <select id="filtroTipo" onchange="carregarHistorico()">
          <option value="">Todos os tipos</option>
          <option value="OK">✅ OK</option>
          <option value="Erro">🚨 Erro</option>
          <option value="Alerta">⚠️ Alerta</option>
        </select>
        <select id="filtroBanco" onchange="carregarHistorico()">
          <option value="">Todos os bancos</option>
        </select>
        <select id="filtroLimit" onchange="carregarHistorico()">
          <option value="50">50 registros</option>
          <option value="100" selected>100 registros</option>
          <option value="500">500 registros</option>
        </select>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr>
            <th>Data/Hora</th><th>Tipo</th><th>Banco</th><th>Cliente</th>
            <th>Doc</th><th>Ciclo</th><th>Arquivo</th>
            <th>Dados GB</th><th>Log GB</th><th>Express %</th><th>Limite</th><th>Status</th>
          </tr></thead>
          <tbody id="tabelaHistorico">
            <tr><td colspan="12" class="loader"><div class="spin"></div> Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</main>

<script>
const fmt = {
  ts: v => {
    if (!v) return '—';
    return new Date(v).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  },
  n: (v, d=3) => v != null ? Number(v).toFixed(d) : '—',
  badge: t => {
    const k = (t||'').toLowerCase();
    const c = k==='ok'?'ok':k==='erro'?'erro':'alerta';
    const l = {ok:'✅ OK',erro:'🚨 Erro',alerta:'⚠️ Alerta'};
    return `<span class="badge ${c}">${l[c]??t}</span>`;
  },
  cardCls: t => {const k=(t||'').toLowerCase(); return k==='ok'?'ok':k==='erro'?'erro':'alerta';},
  exprColor: p => p>=100?'var(--erro)':p>=80?'var(--alerta)':'var(--ok)'
};

let chart = null;

async function carregarBancos() {
  try {
    const bancos = await (await fetch('/api/bancos')).json();
    ['filtroBanco','selectBancoGrafico'].forEach(id => {
      const sel = document.getElementById(id);
      const first = sel.options[0];
      sel.innerHTML = ''; sel.appendChild(first);
      bancos.forEach(b => { const o=document.createElement('option'); o.value=o.textContent=b; sel.appendChild(o); });
    });
  } catch(e) { console.error(e); }
}

async function carregarResumo() {
  const el = document.getElementById('cardsContainer');
  try {
    const rows = await (await fetch('/api/resumo')).json();
    if (!rows.length) { el.innerHTML='<div class="loader">Nenhum evento registrado ainda.</div>'; return; }
    el.innerHTML = rows.map(r => {
      const cls  = fmt.cardCls(r.tipoBackup);
      const isEx = (r.edicao||'').toLowerCase().includes('express');
      const pct  = Number(r.percentualExpress||0);
      const fc   = fmt.exprColor(pct);
      return `
        <div class="card ${cls}">
          <div class="card-header">
            <div class="card-banco">${r.bancoNome??'—'}</div>
            ${fmt.badge(r.tipoBackup)}
          </div>
          <div class="card-cliente">${r.clienteNome??'—'}</div>
          <div class="card-doc">${r.clienteCNPJ??''}</div>
          <div class="card-metrics">
            <div class="metric"><label>Dados</label><value>${fmt.n(r.tamanhoDadosGB)} GB</value></div>
            <div class="metric"><label>Log</label><value>${fmt.n(r.tamanhoLogGB)} GB</value></div>
            <div class="metric"><label>Servidor</label><value style="font-size:11px">${r.servidor??'—'}</value></div>
            <div class="metric"><label>Recovery</label><value style="font-size:11px">${r.recovery??'—'}</value></div>
          </div>
          ${isEx ? `
          <div class="express-bar">
            <div class="express-bar-label">
              <span>Express ${fmt.n(pct,1)}% de 10 GB</span>
              <span style="color:${fc}">${r.statusLimite??''}</span>
            </div>
            <div class="express-track"><div class="express-fill" style="width:${Math.min(pct,100)}%;background:${fc}"></div></div>
          </div>` : `<div class="card-doc" style="margin-top:8px">${r.statusLimite??''}</div>`}
          <div class="card-msg" title="${r.status??''}">${r.status??''}</div>
          <div class="card-ts">Atualizado ${fmt.ts(r.dataExecucao)}</div>
        </div>`;
    }).join('');
  } catch(e) { el.innerHTML=`<div class="loader" style="color:var(--erro)">Erro ao carregar resumo.</div>`; }
}

async function carregarGrafico() {
  const banco = document.getElementById('selectBancoGrafico').value;
  const dias  = document.getElementById('selectDias').value;
  try {
    const url  = `/api/tamanho?dias=${dias}${banco?'&banco='+encodeURIComponent(banco):''}`;
    const rows = await (await fetch(url)).json();
    const labels  = rows.map(r => fmt.ts(r.hora).slice(0,16));
    const dadosGb = rows.map(r => Number(r.dados_gb||0).toFixed(3));
    const logGb   = rows.map(r => Number(r.log_gb||0).toFixed(3));
    const ctx = document.getElementById('chartTamanho').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label:'Dados (GB)', data:dadosGb, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.08)', borderWidth:2, pointRadius:2, pointHoverRadius:5, tension:.3, fill:true },
          { label:'Log (GB)',   data:logGb,   borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,.06)', borderWidth:2, pointRadius:2, pointHoverRadius:5, tension:.3, fill:true }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{backgroundColor:'#111318',borderColor:'#1e2128',borderWidth:1,titleColor:'#e2e6f0',bodyColor:'#9ca3af',padding:10,
            titleFont:{family:"'JetBrains Mono',monospace",size:11},bodyFont:{family:"'JetBrains Mono',monospace",size:11}}
        },
        scales:{
          x:{ticks:{color:'#6b7280',font:{family:"'JetBrains Mono',monospace",size:10},maxTicksLimit:8,maxRotation:0},grid:{color:'#1e2128'}},
          y:{ticks:{color:'#6b7280',font:{family:"'JetBrains Mono',monospace",size:10},callback:v=>v+' GB'},grid:{color:'#1e2128'}}
        }
      }
    });
  } catch(e) { console.error('Gráfico:', e); }
}

async function carregarHistorico() {
  const tbody = document.getElementById('tabelaHistorico');
  const tipo  = document.getElementById('filtroTipo').value;
  const banco = document.getElementById('filtroBanco').value;
  const limit = document.getElementById('filtroLimit').value;
  tbody.innerHTML=`<tr><td colspan="12" class="loader"><div class="spin"></div> Carregando...</td></tr>`;
  try {
    let url = `/api/historico?limit=${limit}`;
    if (tipo)  url += `&tipo=${encodeURIComponent(tipo)}`;
    if (banco) url += `&banco=${encodeURIComponent(banco)}`;
    const rows = await (await fetch(url)).json();
    if (!rows.length) { tbody.innerHTML=`<tr><td colspan="12" class="loader">Nenhum evento encontrado.</td></tr>`; return; }
    tbody.innerHTML = rows.map(r => {
      const isEx = (r.edicao||'').toLowerCase().includes('express');
      const pct  = Number(r.percentualExpress||0);
      const pctH = isEx ? `<span style="color:${fmt.exprColor(pct)}">${fmt.n(pct,1)}%</span>` : `<span class="muted">—</span>`;
      return `<tr>
        <td class="muted">${fmt.ts(r.dataExecucao)}</td>
        <td>${fmt.badge(r.tipoBackup)}</td>
        <td><strong>${r.bancoNome??'—'}</strong></td>
        <td class="muted">${r.clienteNome??'—'}</td>
        <td class="muted" style="font-size:11px">${r.clienteCNPJ??'—'}</td>
        <td class="muted" style="font-size:11px">${r.ciclo??'—'}</td>
        <td class="muted" style="font-size:11px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${r.nomeArquivo??''}">${r.nomeArquivo??'—'}</td>
        <td>${fmt.n(r.tamanhoDadosGB)}</td>
        <td>${fmt.n(r.tamanhoLogGB)}</td>
        <td>${pctH}</td>
        <td class="muted" style="font-size:11px;white-space:nowrap">${r.statusLimite??'—'}</td>
        <td class="muted" style="font-size:11px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${r.status??''}">${r.status??'—'}</td>
      </tr>`;
    }).join('');
  } catch(e) { tbody.innerHTML=`<tr><td colspan="12" class="loader" style="color:var(--erro)">Erro ao carregar histórico.</td></tr>`; }
}

async function carregarTudo() {
  document.getElementById('lastUpdate').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR');
  await carregarBancos();
  await Promise.all([carregarResumo(), carregarGrafico(), carregarHistorico()]);
}

carregarTudo();
setInterval(carregarTudo, 120_000);
</script>
</body>
</html>
